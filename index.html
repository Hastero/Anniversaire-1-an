<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Joyeux 1 An ❤️</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff5f8f,#ff8fb1);
overflow:hidden;
color:white;
}
.screen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-sizing:border-box;
}
h1{font-size:3rem;margin-bottom:10px;}
button{
padding:16px 32px;
border:none;
border-radius:50px;
font-size:1.2rem;
cursor:pointer;
}
#gift{display:none;background:#fff;color:#111;overflow:auto;}
#gift img{max-width:95%;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.2);}
.heart{
position:fixed;
font-size:24px;
animation:fly 4s linear forwards;
}
@keyframes fly{
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>
<body>

<div class="screen" id="home">
<h1>❤️ Joyeux 1 An Mon Amour ❤️</h1>
<p>J'ai préparé une petite surprise pour toi 🥹</p>
<button onclick="openGift()">Découvrir mon cadeau ❤️</button>
</div>

<div class="screen" id="gift">
<img src="Cadeau 1 ans.jpg"
  </div>

<script>
function openGift(){
document.getElementById('home').style.display='none';
document.getElementById('gift').style.display='flex';

for(let i=0;i<60;i++){
let h=document.createElement('div');
h.className='heart';
h.innerHTML='❤️';
h.style.left=Math.random()*100+'vw';
h.style.bottom='-20px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}
}
</script>
</body>
</html>
