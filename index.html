<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Joyeux 1 An Mon Amour ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    overflow:hidden;
    background:linear-gradient(135deg,#ff5c8a,#ff9db8);
}

.page{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.2rem;
    margin-bottom:25px;
}

button{
    border:none;
    border-radius:50px;
    padding:16px 32px;
    font-size:1.1rem;
    cursor:pointer;
    background:white;
    color:#ff4f7a;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

#surprise{
    display:none;
    background:white;
    color:black;
    overflow-y:auto;
}

#surprise img{
    width:90%;
    max-width:700px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fadeIn 2s ease;
}

.heart{
    position:fixed;
    bottom:-50px;
    pointer-events:none;
    z-index:9999;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(0.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>

<body>

<div class="page" id="accueil">
    <h1>❤️ Joyeux 1 An Mon Amour ❤️</h1>
    <p>J'ai préparé une petite surprise rien que pour toi 🥹</p>
    <button onclick="ouvrirCadeau()">Découvrir ma surprise ❤️</button>
</div>

<div class="page" id="surprise">
    <h2 style="margin-bottom:20px;">✨ Une petite surprise t'attend... ✨</h2>

    <img src="TON_IMAGE_ICI.jpg" alt="Surprise">

</div>

<script>

function ouvrirCadeau(){

    document.getElementById("accueil").style.display="none";
    document.getElementById("surprise").style.display="flex";

    for(let i=0;i<120;i++){

        setTimeout(() => {

            let coeur=document.createElement("div");

            coeur.className="heart";
            coeur.innerHTML="❤️";

            coeur.style.left=Math.random()*100+"vw";
            coeur.style.fontSize=(15+Math.random()*35)+"px";

            document.body.appendChild(coeur);

            coeur.animate([
                {
                    transform:"translate(0,0)",
                    opacity:1
                },
                {
                    transform:`translate(${(Math.random()-0.5)*300}px,-120vh)`,
                    opacity:0
                }
            ],{
                duration:3000+Math.random()*4000,
                easing:"linear"
            });

            setTimeout(()=>{
                coeur.remove();
            },7000);

        }, i*80);

    }
}

</script>

</body>
</html>
